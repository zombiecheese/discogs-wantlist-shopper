services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      DISCOGS_CONSUMER_KEY: ${DISCOGS_CONSUMER_KEY}
      DISCOGS_CONSUMER_SECRET: ${DISCOGS_CONSUMER_SECRET}
      DISCOGS_USER_AGENT: ${DISCOGS_USER_AGENT:-discogs-wantlist-shopper/0.1.0}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      DISCOGS_PERSONAL_ACCESS_TOKEN: ${DISCOGS_PERSONAL_ACCESS_TOKEN}
      DISCOGS_USERNAME: ${DISCOGS_USERNAME}
    ports:
      - "3000:3000"